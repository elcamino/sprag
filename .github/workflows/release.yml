name: Release binaries

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend (embedded into the binary)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Cross-compile binaries
        env:
          CGO_ENABLED: '0'
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          targets="linux/amd64 linux/arm64 linux/arm darwin/amd64 darwin/arm64 freebsd/amd64"
          for t in $targets; do
            os="${t%/*}"; arch="${t#*/}"
            name="sprag_${VERSION}_${os}_${arch}"
            mkdir -p "dist/${name}"
            armenv=""
            if [ "$arch" = "arm" ]; then armenv="GOARM=7"; fi
            echo "building ${name}"
            env GOOS="$os" GOARCH="$arch" $armenv \
              go build -trimpath -ldflags="-s -w" -o "dist/${name}/sprag" ./cmd/sprag
            cp LICENSE README.md "dist/${name}/"
            tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            rm -rf "dist/${name}"
          done
          ( cd dist && sha256sum *.tar.gz > SHA256SUMS )
          ls -la dist

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "$VERSION" \
            --title "Sprag $VERSION" \
            --generate-notes \
            dist/*.tar.gz dist/SHA256SUMS \
          || gh release upload "$VERSION" dist/*.tar.gz dist/SHA256SUMS --clobber
