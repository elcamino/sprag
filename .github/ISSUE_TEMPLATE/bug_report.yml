name: Bug report
description: Report a reproducible Sprag defect
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. For exploitable security issues, do not use this form; email security@sprag.org instead.
  - type: input
    id: version
    attributes:
      label: Sprag version
      description: Tag, commit hash, or Docker image identifier.
      placeholder: v1.5.1
    validations:
      required: true
  - type: dropdown
    id: deployment_mode
    attributes:
      label: Deployment mode
      options:
        - Plaintext intake
        - E2E optional
        - E2E required
        - Onion-only Tor ingress
        - Local development
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Give exact commands, UI steps, or HTTP requests.
      placeholder: |
        1. Create an intake page with...
        2. Upload a file...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact secrets, upload URLs, receipt URLs, object keys, passwords, private keys, and `.env` values.
      render: text
